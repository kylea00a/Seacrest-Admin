# Sends Telegram calendar-due notifications on a fixed interval (no browser required).
# Add repository secrets: APP_URL (e.g. https://your-app.vercel.app), TELEGRAM_CRON_SECRET.
name: Telegram schedule cron

on:
  schedule:
    # Every 5 minutes (GitHub minimum interval for scheduled workflows)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  calendar-due:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger calendar-due
        env:
          APP_URL: ${{ secrets.APP_URL }}
          TELEGRAM_CRON_SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Skip: APP_URL secret is not set."
            exit 0
          fi
          URL="${APP_URL%/}/api/admin/telegram/calendar-due?source=github-cron"
          if [ -n "$TELEGRAM_CRON_SECRET" ]; then
            curl -fsS --max-time 120 -H "Authorization: Bearer ${TELEGRAM_CRON_SECRET}" "$URL"
          else
            curl -fsS --max-time 120 "$URL"
          fi
