name: Deploy Seacrest Admin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/Seacrest-Admin
            git pull origin main
            npm install
            npm run build
            npm run search-index:rebuild
            chmod +x scripts/install-server-telegram-cron.sh
            bash scripts/install-server-telegram-cron.sh
            pm2 delete seacrest-admin 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 save
