name: Deploy Seacrest Admin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build (CI — not on 2GB droplet)
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Pack release
        run: |
            tar czf release.tar.gz \
            .next \
            node_modules \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            next.config.ts \
            public \
            scripts/server-apply-release.sh \
            scripts/server-start.sh

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: release.tar.gz
          target: /var/www/Seacrest-Admin

      - name: Apply release on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/Seacrest-Admin
            tar xzf release.tar.gz
            rm -f release.tar.gz
            bash scripts/server-start.sh
